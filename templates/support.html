<!DOCTYPE html>
<html>
<head>
    <title>{{ t.support_title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="{{ session.get('theme','light') }}">

    <a href="{{ request.referrer or url_for('index') }}" 
   class="back-arrow">←</a>

<div class="page-bg">

    <div class="form-card">

        <h2 class="form-title">🎧 {{ t.support_title }}</h2>

<p>{{ t.support_text }}</p>

<h3>🤝 {{ t.helpline }}</h3>
<p>• {{ t.tip_friend }}</p>
<p>• {{ t.tip_teacher }}</p>
<p>• {{ t.tip_counselor }}</p>

<h3>📞 {{ t.helpline }}</h3>
<p><b>{{ t.helpline_name }}</b><br>
1800-599-0019</p>

<h3>📚 {{ t.tips }}</h3>
<p>• {{ t.tip1 }}</p>
<p>• {{ t.tip2 }}</p>
<p>• {{ t.tip3 }}</p>

<a href="/">
    <button class="next-btn">⬅ {{ t.back_home }}</button>
</a>


    </div>

</div>

<script>
    function toggleTheme() {
        let body = document.body;
    
        if (body.classList.contains("dark")) {
            body.classList.remove("dark");
            body.classList.add("light");
            localStorage.setItem("theme", "light");
        } else {
            body.classList.remove("light");
            body.classList.add("dark");
            localStorage.setItem("theme", "dark");
        }
    }
    
    window.onload = function() {
        let saved = localStorage.getItem("theme");
        if (saved) document.body.className = saved;
    }
    </script>
    
    

</body>
</html>
