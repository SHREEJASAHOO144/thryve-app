<!DOCTYPE html>
<html>
<head>
    <title>{{ t.mood_title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<script>
function toggleTheme() {
    let body = document.body;

    if (body.classList.contains("dark")) {
        body.classList.remove("dark");
        body.classList.add("light");
        localStorage.setItem("theme", "light");
    } else {
        body.classList.remove("light");
        body.classList.add("dark");
        localStorage.setItem("theme", "dark");
    }
}

window.onload = function() {
    let saved = localStorage.getItem("theme");
    if (saved) document.body.className = saved;
}
</script>

<body class="{{ session.get('theme','light') }}">

<a href="{{ url_for('index') }}" class="back-arrow">←</a>

<div class="page-bg">
    <div class="form-card">

        <h2 class="form-title">😊 {{ t.mood_title }}</h2>

        <p class="form-subtitle">
            {{ t.mood_question }}
        </p>

        <form method="POST" action="{{ url_for('mood') }}">

            <select name="mood" class="mood-select" required>
    <option value="good">😊 {{ t.mood_good }}</option>
    <option value="ok">😐 {{ t.mood_ok }}</option>
    <option value="low">😞 {{ t.mood_low }}</option>
    <option value="stress">😣 {{ t.mood_stress }}</option>
</select>

            <textarea name="journal"
                      placeholder="{{ t.journal_ph }}"
                      rows="4"></textarea>

            <button type="submit" class="next-btn">
                {{ t.save_btn }}
            </button>

        </form>

        <br><br>

        <div class="mood-history-btn">

<a href="{{ url_for('mood_history') }}" class="next-btn">
📊 {{ t.view_history }}
</a>

</div>

        

    </div>
</div>

</body>
</html>
