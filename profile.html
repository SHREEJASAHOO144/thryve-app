<!DOCTYPE html>
<html>
<head>
    <title>Enter Your Details</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="{{ session.get('theme','light') }}">

    <a href="/" class="back-arrow">←</a>
    
<div class="page-bg">

    <div class="form-card">

        <h2 class="form-title">✏️ Enter Your Details</h2>
        <p class="form-subtitle">
            Please fill out the information below to proceed.
        </p>

        <form method="POST" action="{{ url_for('profile') }}">

            <label>Name</label>
            <input type="text" name="name" placeholder="Enter your name" required>

            <label>Age</label>
            <input type="number" name="age" placeholder="Enter your age" required>

            <label>Course</label>
            <input type="text" name="course" placeholder="Enter your course" required>

            <button type="submit" class="next-btn">Next ➤</button>

        </form>

    </div>

</div>

<script>
    function toggleTheme() {
        let body = document.body;
    
        if (body.classList.contains("dark")) {
            body.classList.remove("dark");
            body.classList.add("light");
            localStorage.setItem("theme", "light");
        } else {
            body.classList.remove("light");
            body.classList.add("dark");
            localStorage.setItem("theme", "dark");
        }
    }
    
    window.onload = function() {
        let saved = localStorage.getItem("theme");
        if (saved) document.body.className = saved;
    }
    </script>
    
    

</body>
</html>
