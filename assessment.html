<!DOCTYPE html>
<html>
<head>
    <title>Stress Assessment</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="{{ session.get('theme','light') }}">

    <a href="/" class="back-arrow">←</a>
    
<div class="page-bg">

    <div class="form-card">

        <h2 class="form-title">🧠 Stress Assessment</h2>
        <p class="form-subtitle">
            Answer the questions below to assess your stress level.
        </p>

        <form method="POST" action="{{ url_for('assessment') }}">

            <label>⏰ Sleep Hours</label>
            <select name="sleep">
                <option value="3">Less than 5 hrs</option>
                <option value="2">5–7 hrs</option>
                <option value="1">More than 7 hrs</option>
            </select>

            <label>😟 Mood</label>
            <select name="mood">
                <option value="3">Very Low</option>
                <option value="2">Normal</option>
                <option value="1">Good</option>
            </select>

            <label>🏠 Family Pressure</label>
            <select name="pressure">
                <option value="3">High</option>
                <option value="2">Moderate</option>
                <option value="1">Low</option>
            </select>

            <button type="submit" class="next-btn">
                Check Stress Level ➤
            </button>

        </form>

    </div>

</div>

<script>
    function toggleTheme() {
        let body = document.body;
    
        if (body.classList.contains("dark")) {
            body.classList.remove("dark");
            body.classList.add("light");
            localStorage.setItem("theme", "light");
        } else {
            body.classList.remove("light");
            body.classList.add("dark");
            localStorage.setItem("theme", "dark");
        }
    }
    
    window.onload = function() {
        let saved = localStorage.getItem("theme");
        if (saved) document.body.className = saved;
    }
    </script>
    
    

</body>
</html>
