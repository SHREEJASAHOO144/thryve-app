<!DOCTYPE html>
<html>
<head>
    <title>Result</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="{{ session.get('theme','light') }}">

    <a href="/" class="back-arrow">←</a>
    
<div class="page-bg">

    <div class="form-card">

        <h2 class="form-title">🔥 Your Stress Result</h2>

<div style="font-size:60px;">{{ emoji }}</div>

<div class="score-circle">
    {{ score }}
</div>

<p><b>Stress Level:</b> {{ level }}</p>

<p>{{ advice }}</p>

<hr>

<h3>💡 Motivation</h3>
<p>"{{ quote }}"</p>

<hr>

<h3>🧘 Quick Relax Tools</h3>
<p>• Take 5 deep breaths</p>
<p>• Stretch your body</p>
<p>• Drink water</p>

<div class="result-actions">

    <a href="/mood">
        <button class="mood-btn">😊 Track Mood</button>
    </a>

    <a href="/support">
        <button class="support-btn">🧘 Get Support</button>
    </a>

</div>
        

    </div>

</div>

<script>
    function toggleTheme() {
        let body = document.body;
    
        if (body.classList.contains("dark")) {
            body.classList.remove("dark");
            body.classList.add("light");
            localStorage.setItem("theme", "light");
        } else {
            body.classList.remove("light");
            body.classList.add("dark");
            localStorage.setItem("theme", "dark");
        }
    }
    
    window.onload = function() {
        let saved = localStorage.getItem("theme");
        if (saved) document.body.className = saved;
    }
    </script>
    
    

</body>
</html>
